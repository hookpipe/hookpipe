name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter @hookpipe/shared build
      - name: Typecheck
        run: pnpm --filter @hookpipe/worker typecheck && pnpm --filter hookpipe typecheck
      - name: Test
        run: pnpm --filter @hookpipe/worker test

  publish-cli:
    name: Publish hookpipe CLI
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - name: Build shared
        run: pnpm --filter @hookpipe/shared build
      - name: Build CLI
        run: pnpm --filter hookpipe build
      - name: Publish to npm
        run: npm publish --access public --provenance
        working-directory: packages/cli

  update-homebrew:
    name: Update Homebrew formula
    needs: publish-cli
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: hookpipe/homebrew-hookpipe
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-hookpipe
      - name: Update formula version and SHA256
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://registry.npmjs.org/hookpipe/-/hookpipe-${VERSION}.tgz"
          SHA256=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
          sed -i "s|url \".*\"|url \"${URL}\"|" homebrew-hookpipe/Formula/hookpipe.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" homebrew-hookpipe/Formula/hookpipe.rb
      - name: Commit and push
        run: |
          cd homebrew-hookpipe
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hookpipe.rb
          git commit -m "hookpipe ${GITHUB_REF_NAME#v}"
          git push
