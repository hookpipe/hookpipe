name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @hookflare/shared build

      - name: Typecheck
        run: pnpm --filter @hookflare/worker typecheck && pnpm --filter hookflare typecheck

      - name: Test with coverage
        run: pnpm --filter @hookflare/worker test -- --coverage

      - name: Build CLI
        run: pnpm --filter hookflare build

      - name: Verify CLI runs
        run: node packages/cli/dist/index.js --version
