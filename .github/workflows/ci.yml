name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @hookpipe/shared build

      - name: Build providers
        run: pnpm --filter @hookpipe/providers build

      - name: Typecheck
        run: pnpm --filter @hookpipe/worker typecheck && pnpm --filter hookpipe typecheck

      - name: Unit tests (no D1)
        run: pnpm --filter @hookpipe/worker vitest run test/crypto.test.ts test/circuit-breaker.test.ts test/delivery.test.ts

      - name: Integration tests — batch 1
        run: pnpm --filter @hookpipe/worker vitest run test/api.test.ts test/bootstrap.test.ts test/validation.test.ts

      - name: Integration tests — batch 2
        run: pnpm --filter @hookpipe/worker vitest run test/secret-masking.test.ts test/transfer.test.ts test/delivery-manager.test.ts

      - name: Integration tests — batch 3 (security)
        run: pnpm --filter @hookpipe/worker vitest run test/security.test.ts

      - name: Build CLI
        run: pnpm --filter hookpipe build

      - name: Verify CLI runs
        run: node packages/cli/dist/index.js --version
